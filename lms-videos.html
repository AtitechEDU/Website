<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATITECH EDU PVT LTD | LMS Videos</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
:root {
  color-scheme: light;
  --bg: #eef5ff;
  --surface: rgba(255,255,255,0.92);
  --card: #ffffff;
  --text: #0f172a;
  --muted: #475569;
  --primary: #0f6fff;
  --primary-dark: #0a4fb5;
  --border: rgba(15,111,255,0.16);
  --shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
  --hero-bg: rgba(255,255,255,0.92);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Inter, Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #eef5ff 0%, #f9fbff 100%);
  color: var(--text);
  line-height: 1.6;
}

a {
  color: inherit;
  text-decoration: none;
}

.topbar {
  width: min(1200px, 96%);
  margin: 28px auto 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 20px 24px;
  border-radius: 24px;
  background: rgba(255,255,255,0.78);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  backdrop-filter: blur(16px);
}

.brand-link {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-link h1 {
  font-size: 1rem;
  letter-spacing: -0.02em;
}

.brand-link p {
  color: var(--muted);
  font-size: 0.92rem;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}

.nav-links a {
  color: var(--muted);
  font-weight: 600;
  transition: color 0.25s ease, transform 0.25s ease;
}

.nav-links a:hover {
  color: var(--primary);
  transform: translateY(-1px);
}

.hero {
  width: min(1200px, 96%);
  margin: 28px auto 0;
  padding: 36px;
  border-radius: 32px;
  background: linear-gradient(135deg, var(--hero-bg), rgba(255,255,255,0.65));
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.hero h2 {
  font-size: clamp(2rem, 2.7vw, 3rem);
  max-width: 860px;
  margin-bottom: 18px;
}

.hero p {
  color: var(--muted);
  max-width: 720px;
  margin-bottom: 24px;
  font-size: 1rem;
}

.hero-actions {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 14px 20px;
  border-radius: 999px;
  font-weight: 700;
  transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
}

.btn:hover {
  transform: translateY(-2px);
}

.btn.primary {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 14px 30px rgba(15, 111, 255, 0.2);
}

.btn.secondary {
  background: rgba(15, 111, 255, 0.1);
  color: var(--primary);
}

.video-grid {
  width: min(1260px, 96%);
  margin: 36px auto 56px;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 24px;
}

.video-card {
  position: relative;
  background: var(--card);
  border-radius: 24px;
  overflow: hidden;
  border: 1px solid rgba(15, 111, 255, 0.12);
  box-shadow: var(--shadow);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.video-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
}

.video-actions {
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 2;
}

.video-expand {
  border: none;
  background: rgba(15, 111, 255, 0.92);
  color: #fff;
  padding: 10px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 700;
  font-size: 0.9rem;
  transition: transform 0.2s ease, background 0.2s ease;
}

.video-expand:hover {
  transform: translateY(-1px);
  background: rgba(10, 79, 181, 0.94);
}

.video-card iframe {
  width: 100%;
  height: 220px;
  border: none;
  display: block;
}

.video-content {
  padding: 22px;
}

.video-modal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(15, 23, 42, 0.72);
  padding: 24px;
  z-index: 9999;
}

.video-modal.open {
  display: flex;
}

.video-modal-content {
  width: min(1140px, 100%);
  max-height: min(80vh, 760px);
  border-radius: 28px;
  overflow: hidden;
  background: #0f172a;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 36px 90px rgba(0, 0, 0, 0.35);
}

.video-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 20px;
  background: rgba(15, 23, 42, 0.95);
}

.video-modal-title {
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
}

.video-modal-close {
  border: none;
  background: rgba(255,255,255,0.08);
  color: #fff;
  padding: 10px 16px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 700;
}

.video-modal-iframe {
  width: 100%;
  height: calc(80vh - 72px);
  min-height: 420px;
  border: none;
  display: block;
}

.video-modal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(15, 23, 42, 0.72);
  padding: 24px;
  z-index: 9999;
}

.video-modal.open {
  display: flex;
}

.video-modal-content {
  width: min(1140px, 100%);
  max-height: min(80vh, 760px);
  border-radius: 28px;
  overflow: hidden;
  background: #0f172a;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 36px 90px rgba(0, 0, 0, 0.35);
}

.video-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 20px;
  background: rgba(15, 23, 42, 0.95);
}

.video-modal-title {
  color: #fff;
  font-size: 1rem;
  font-weight: 700;
}

.video-modal-close {
  border: none;
  background: rgba(255,255,255,0.08);
  color: #fff;
  padding: 10px 16px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 700;
}

.video-modal-iframe {
  width: 100%;
  height: calc(80vh - 72px);
  min-height: 420px;
  border: none;
  display: block;
}

.video-day {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--primary);
  color: #fff;
  padding: 8px 16px;
  border-radius: 999px;
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}

.video-content h3 {
  margin-bottom: 10px;
  font-size: 1.05rem;
  line-height: 1.4;
}

.category {
  color: var(--muted);
  font-size: 0.95rem;
}

.intro-text {
  width: 100%;
  text-align: center;
  color: var(--muted);
  padding: 44px 20px;
}

.user-panel {
  width: min(1200px, 96%);
  margin: 0 auto 30px;
  padding: 18px 22px;
  background: rgba(255,255,255,0.82);
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(16px);
}

.user-panel-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.user-email {
  font-weight: 700;
  color: var(--text);
}

@media (max-width: 1180px) {
  .video-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 900px) {
  .topbar,
  .hero {
    padding: 24px;
  }

  .hero h2 {
    font-size: 2rem;
  }

  .video-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 680px) {
  .topbar {
    flex-direction: column;
    align-items: stretch;
  }

  .nav-links {
    justify-content: center;
  }

  .video-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header class="topbar">
  <a class="brand-link" href="/">
    <div>
      <h1>ATITECH EDU PVT LTD</h1>
      <p>Empowering careers through practical learning</p>
    </div>
  </a>
  <nav class="nav-links">
    <a href="/">Home</a>
    <a href="/lms">LMS</a>
    <a href="/mern-brochure.pdf" target="_blank">Brochure</a>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
  </nav>
</header>

<section class="hero">

    <h2>Recorded classes and learning resources</h2>

    <p>
        Access course videos in a modern, branded portal that matches the ATITECH EDU homepage.
    </p>

    <div class="hero-actions">
      <a class="btn primary" href="/lms">Go to LMS Portal</a>
      <a class="btn secondary" href="/">Back to Home</a>
    </div>

</section>

<section class="section user-panel">
  <div class="user-panel-inner">
    <p id="user-email" class="user-email"></p>
    <button id="logout-button" class="btn secondary">Logout</button>
  </div>
</section>

<section>

<div id="lms-videos" class="video-grid">

</div>

</section>

<script>
  const videos = [

{
day:"DAY 1",
title:"HTML DAY-01",
category:"HTML",
url:"https://drive.google.com/file/d/1x3uJu2Pk-0yh_toh_JAmAifXeLglG_Xg/preview"
},

{
day:"DAY 3",
title:"CSS DAY-03",
category:"CSS",
url:"https://drive.google.com/file/d/1GjDNjnazerczBXkMMFxEcHy3Ou9t1zj2/preview"
},

{
day:"DAY 5",
title:"JavaScript DAY-05",
category:"JavaScript",
url:"https://drive.google.com/file/d/1akv9llf2u7inl_whCXIEW2cOE3Qh9_5-/preview"
},

{
day:"DAY 7",
title:"GitHub DAY-08 PART 1",
category:"GitHub",
url:"https://drive.google.com/file/d/1Q-jd-M0DpAbaGAFl8oPDlsr06kYqYssa/preview"
},

{
day:"DAY 9",
title:"ReactJS DAY-08 PART 2",
category:"ReactJS",
url:"https://drive.google.com/file/d/1Gh-IFgwoXMxEsE3Pa57HogWnFLn38cS9/preview"
},

{
day:"DAY 12",
title:"MongoDB DAY-12",
category:"MongoDB",
url:"https://drive.google.com/file/d/1QtMCDUxJBasA0QtUtBDzizYvK503qBve/preview"
},

{
day:"DAY 15",
title:"TODO MERN DAY-15",
category:"MERN Project",
url:"https://drive.google.com/file/d/17sii67ZrBN_PlySQvQ2ciE8qgLLPhdMH/preview"
},

{
day:"DAY 18",
title:"MERN CHATAPP DAY-18",
category:"MERN Project",
url:"https://drive.google.com/file/d/1eKcjFPX54PP2aWsuDoeD0KbATXiqTPXA/preview"
},

{
day:"DAY 21",
title:"MERN DEEPSEEK CLONE DAY-21",
category:"MERN Project",
url:"https://drive.google.com/file/d/1NFTD9fnQKW9btsZiYMy65VxwQLDVuOMU/preview"
},

{
day:"DAY 24",
title:"E-COMMERCE MERN DAY-24",
category:"MERN Project",
url:"https://drive.google.com/file/d/1iR7cbh2jRHpDuj9vzmreXk2qXh3JoTkj/preview"
},

{
day:"DAY 27",
title:"MERN CHATAPP DAY-27",
category:"MERN Project",
url:"https://drive.google.com/file/d/1XkNbDDqYBGDvVZjiXvMoz9GrJBllH4iJ/preview"
}

];

const container=document.getElementById("lms-videos");

function normalizeDriveUrl(url) {
  if (!url) return url;
  try {
    const parsed = new URL(url);
    const path = parsed.pathname;
    const params = parsed.searchParams;

    if (path.includes('/file/d/')) {
      const id = path.split('/file/d/')[1].split('/')[0];
      return `https://drive.google.com/file/d/${id}/preview`;
    }

    if (params.has('id')) {
      return `https://drive.google.com/file/d/${params.get('id')}/preview`;
    }

    return url;
  } catch (error) {
    return url;
  }
}

const requestedUrl = normalizeDriveUrl(new URLSearchParams(window.location.search).get('url'));
const selectedVideo = requestedUrl ? videos.find((video) => normalizeDriveUrl(video.url) === requestedUrl) : null;
const renderList = requestedUrl ? (selectedVideo ? [selectedVideo] : [{
  day: 'Selected Video',
  title: 'Drive Video',
  category: 'Custom',
  url: requestedUrl
}]) : videos;

function openVideoModal(url, title) {
  let modal = document.getElementById('video-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'video-modal';
    modal.className = 'video-modal';
    modal.innerHTML = `
      <div class="video-modal-content">
        <div class="video-modal-header">
          <div class="video-modal-title"></div>
          <button class="video-modal-close" type="button">Close</button>
        </div>
        <iframe class="video-modal-iframe" allowfullscreen></iframe>
      </div>
    `;
    document.body.appendChild(modal);
    modal.addEventListener('click', (event) => {
      if (event.target === modal || event.target.closest('.video-modal-close')) {
        closeVideoModal();
      }
    });
  }

  modal.querySelector('.video-modal-title').textContent = title;
  modal.querySelector('.video-modal-iframe').src = url;
  modal.classList.add('open');
}

function closeVideoModal() {
  const modal = document.getElementById('video-modal');
  if (!modal) return;
  const iframe = modal.querySelector('.video-modal-iframe');
  if (iframe) iframe.src = '';
  modal.classList.remove('open');
}

document.addEventListener('click', (event) => {
  const target = event.target;
  if (target.matches('.video-expand')) {
    openVideoModal(target.dataset.url, target.dataset.title);
  }
});

document.addEventListener('keyup', (event) => {
  if (event.key === 'Escape') {
    closeVideoModal();
  }
});

if (!renderList.length) {
  container.innerHTML = '<p class="intro-text">No video available.</p>';
} else {
  renderList.forEach(video => {
    container.innerHTML += `

    <div class="video-card">
      <div class="video-actions">
        <button type="button" class="video-expand" data-url="${video.url}" data-title="${video.title}">View Larger</button>
      </div>
      <iframe
        src="${video.url}"
        allowfullscreen>
      </iframe>

      <div class="video-content">

        <span class="video-day">
          ${video.day}
        </span>

        <h3>${video.title}</h3>

        <p class="category">
          ${video.category}
        </p>

      </div>

    </div>

    `;
  });
}
</script>
<script src="/script.js"></script>
</body>
</html>
